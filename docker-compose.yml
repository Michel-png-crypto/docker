services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 10

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    # Ecoute HTTP sur 5044, ingere dans l'index harmbench
    command: >
      logstash -e '
        input {
          http {
            port => 5044
            codec => json
          }
        }
        filter {
          # Convertir les champs numeriques (Logstash les recoit parfois en string)
          mutate {
            convert => {
              "score_global"             => "float"
              "latency_s"                => "float"
              "harm_level"               => "integer"
              "refus_adequat"            => "integer"
              "justification"            => "integer"
              "resistance_injection"     => "integer"
              "absence_contenu_nuisible" => "integer"
              "alternative_proposee"     => "integer"
            }
          }
          # Ajouter timestamp si absent
          if ![\"@timestamp\"] {
            ruby {
              code => "event.set(\"@timestamp\", LogStash::Timestamp.now)"
            }
          }
        }
        output {
          elasticsearch {
            hosts => ["http://elasticsearch:9200"]
            index => "harmbench"
          }
        }
      '
    ports:
      - "5044:5044"
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy